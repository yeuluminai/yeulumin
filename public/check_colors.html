<!DOCTYPE html>
<html>
<head>
  <title>Check Image Colors</title>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="result" style="font-family: monospace; font-size: 16px; margin: 20px; white-space: pre-wrap;">Running...</div>
  <script>
    const images = [
      "/landing_page/ChatGPT Image Jun 30, 2026, 11_23_11 AM.png",
      "/landing_page/ChatGPT Image Jun 30, 2026, 11_27_10 AM.png",
      "/landing_page/ChatGPT Image Jun 30, 2026, 11_29_18 AM.png",
      "/landing_page/ChatGPT Image Jun 30, 2026, 11_38_39 AM.png"
    ];
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultDiv = document.getElementById('result');
    
    Promise.all(images.map(src => {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          // Sample a pixel near the top-left corner
          const p = ctx.getImageData(20, 20, 1, 1).data;
          const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1);
          resolve({ src, hex });
        };
        img.onerror = () => resolve({ src, hex: 'failed' });
        img.src = src;
      });
    })).then(results => {
      resultDiv.innerText = JSON.stringify(results, null, 2);
    }).catch(err => {
      resultDiv.innerText = 'Error: ' + err.message;
    });
  </script>
</body>
</html>
